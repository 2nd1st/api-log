# golangci-lint config. Keep minimal; principle 5 (one tool, default config).
# Run: `golangci-lint run ./...`

version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell

  settings:
    govet:
      # shadow disabled — re-declaring `err` in inner scopes is
      # idiomatic Go and the warning is high-noise / low-signal.
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
    errcheck:
      # Ignore the common Go idioms where we don't care about the
      # return value: deferred Close calls, response-body teardown,
      # and write-to-discard-style Fprintf.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (io.ReadCloser).Close
        - (*net/http.Response.Body).Close
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln

  exclusions:
    rules:
      # Tests + experiments are exploratory; the high-noise warnings
      # there don't represent shipping defects.
      - path: _test\.go$
        linters:
          - errcheck
          - gocritic
          - staticcheck
      - path: ^experiments/
        linters:
          - errcheck
          - gocritic
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
